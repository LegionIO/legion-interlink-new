name: Release

on:
  workflow_dispatch:
    inputs:
      verbump:
        description: Version bump to apply before releasing
        required: true
        default: patch
        type: choice
        options:
          - none
          - major
          - minor
          - patch
      upstream_ref:
        description: Upstream kai-desktop ref to build from
        required: false
        default: main
        type: string

concurrency:
  group: legion-interlink-release
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != "branch" ]; then
            echo "workflow_dispatch must run from a branch ref." >&2
            exit 1
          fi

          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "workflow_dispatch releases are only allowed from ${DEFAULT_BRANCH}, not ${REF_NAME}." >&2
            exit 1
          fi

      - name: Bump builder version
        if: ${{ inputs.verbump != 'none' }}
        run: |
          current="$(tr -d '[:space:]' < VERSION)"
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ inputs.verbump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          echo "${major}.${minor}.${patch}" > VERSION

      - name: Resolve release version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Commit builder version bump
        if: ${{ inputs.verbump != 'none' }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION

          if git diff --cached --quiet; then
            echo "VERSION did not change after version bump." >&2
            exit 1
          fi

          git commit -m "release: v${VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Ensure release tag is new
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin

          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists." >&2
            exit 1
          fi

      - name: Create and push release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

  publish-release:
    needs: prepare-release
    runs-on: macos-26
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    outputs:
      asset_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Clone upstream
        env:
          UPSTREAM_REF: ${{ inputs.upstream_ref || 'main' }}
        run: |
          git clone --depth 1 --branch "$UPSTREAM_REF" \
            https://github.com/kai-systems/kai-desktop.git \
            upstream
          rm -f upstream/.npmrc

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: upstream/pnpm-lock.yaml

      - name: Overlay Legion branding and required plugin
        env:
          LEGION_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          cp branding/branding.config.ts upstream/branding.config.ts

          if find branding/build -type f | grep -q .; then
            cp -f branding/build/* upstream/build/
          fi

          mkdir -p upstream/bundled-plugins
          rm -rf upstream/bundled-plugins/legion
          cp -R plugins/legion upstream/bundled-plugins/legion

          cd upstream
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.name = 'legion-interlink';
            pkg.productName = 'Legion Interlink';
            pkg.description = 'Legion Interlink - Local AI Assistant';
            pkg.version = process.env.LEGION_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - run: pnpm install --frozen-lockfile
        working-directory: upstream

      - run: pnpm build:mac
        working-directory: upstream

      - name: Verify Swift helper binary
        working-directory: upstream
        run: |
          APP_PATH="$(find dist/mac-arm64 -maxdepth 1 -name '*.app' -type d | head -n 1)"
          HELPER="$APP_PATH/Contents/Resources/bin/LocalMacosHelper"

          if [ ! -x "$HELPER" ]; then
            echo "ERROR: LocalMacosHelper binary not found or not executable at $HELPER" >&2
            exit 1
          fi

          echo "Helper binary: $(ls -la "$HELPER")"
          echo "Architectures: $(lipo -archs "$HELPER")"
          echo "Code signature:"
          codesign -dvv "$HELPER" 2>&1

          RESULT=$("$HELPER" permissions 2>&1)
          echo "Permissions check output: $RESULT"

          if ! echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('ok') is True"; then
            echo "ERROR: LocalMacosHelper permissions check failed" >&2
            exit 1
          fi

          echo "✓ LocalMacosHelper binary verified"

      - name: Verify code signature
        working-directory: upstream
        run: |
          APP_PATH="$(find dist/mac-arm64 -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in dist/mac-arm64/" >&2
            exit 1
          fi

          echo "Verifying signature: $APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo ""
          echo "Checking notarization staple:"
          xcrun stapler validate "$APP_PATH" || echo "Warning: staple not found (notarization may still be processing)"

      - name: Locate DMG artifact
        id: artifact
        working-directory: upstream
        run: |
          artifact_path="$(find dist -maxdepth 1 -type f -name '*.dmg' | head -n 1)"

          if [ -z "$artifact_path" ]; then
            echo "No DMG artifact found in dist/." >&2
            exit 1
          fi

          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$artifact_path")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release create "$TAG" "upstream/${{ steps.artifact.outputs.path }}" \
            --generate-notes \
            --title "$TAG" \
            --verify-tag

  update-cask:
    needs:
      - prepare-release
      - publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download DMG and compute SHA256
        id: sha
        env:
          ASSET_NAME: ${{ needs.publish-release.outputs.asset_name }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --pattern "$ASSET_NAME" \
            --repo "${{ github.repository }}" \
            --output interlink.dmg
          sha=$(shasum -a 256 interlink.dmg | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "asset_name_url=${ASSET_NAME// /%20}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: LegionIO/homebrew-tap
          token: ${{ secrets.HOMEBREW_DISPATCH_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        working-directory: homebrew-tap
        env:
          ASSET_NAME_URL: ${{ steps.sha.outputs.asset_name_url }}
          REPOSITORY: ${{ github.repository }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          mkdir -p Casks
          cat > Casks/legion-interlink.rb << RUBY
          cask "legion-interlink" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${REPOSITORY}/releases/download/v#{version}/${ASSET_NAME_URL}"
            name "Legion Interlink"
            desc "LegionIO desktop client"
            homepage "https://github.com/${REPOSITORY}"

            app "Legion Interlink.app"

            zap trash: "~/.legionio"
          end
          RUBY

      - name: Commit and push cask update
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/legion-interlink.rb

          if git diff --cached --quiet; then
            echo "Cask formula is already up to date."
            exit 0
          fi

          git commit -m "update legion-interlink cask to ${VERSION}"
          git push
