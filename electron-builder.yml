appId: com.legion.interlink
productName: Legion Interlink
executableName: Legion Interlink
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - "!**/*.map"
extraResources:
  - from: build/bin/LocalMacosHelper
    to: bin/LocalMacosHelper
icon: build/icon.icns
mac:
  category: public.app-category.developer-tools
  extendInfo:
    CFBundleDisplayName: Legion Interlink
    CFBundleName: Legion Interlink
    NSMicrophoneUsageDescription: "Legion Interlink uses the microphone for voice dictation (speech-to-text)."
    NSAppleEventsUsageDescription: "Legion Interlink uses Apple Events to activate apps and inspect focused windows during Local Mac computer control."
    NSScreenCaptureUsageDescription: "Legion Interlink captures your screen to enable Local Mac computer control and allow the AI to see what's on your display."
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: "Legion-Interlink-${version}-arm64.${ext}"
  identity: null
